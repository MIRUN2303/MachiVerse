<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 200" width="600" height="200">
  <defs>
    <style>
      @font-face {
        font-family: 'Strandhill';
        src: url('/fonts/Strandhill.otf') format('opentype');
        font-display: swap;
      }
      .logo { font-family: 'Strandhill', 'Plus Jakarta Sans', sans-serif; font-weight: 900; }
    </style>
    <filter id="green-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="12" result="blur"/>
      <feColorMatrix in="blur" type="matrix"
        values="0 0 0 0 0.667
                0 0 0 0 0.922
                0 0 0 0 0
                0 0 0 0.6 0" result="glow"/>
      <feMerge>
        <feMergeNode in="glow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="600" height="200" rx="20" fill="#080808"/>

  <!-- "Whos" glow layer -->
  <text x="60" y="112" class="logo" font-size="72" fill="rgba(255,255,255,0.08)" letter-spacing="8">Whos</text>

  <!-- "Whos" main -->
  <text x="60" y="112" class="logo" font-size="72" fill="rgba(255,255,255,0.85)" letter-spacing="8">Whos</text>

  <!-- "I" glow -->
  <text x="292" y="108" class="logo" font-size="88" fill="#aaeb00" filter="url(#green-glow)" letter-spacing="8">I</text>

  <!-- "I" main -->
  <text x="292" y="108" class="logo" font-size="88" fill="#aaeb00" letter-spacing="8">I</text>

  <!-- "n" main -->
  <text x="322" y="112" class="logo" font-size="72" fill="rgba(255,255,255,0.85)" letter-spacing="8">n</text>
</svg>
